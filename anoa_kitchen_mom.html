<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亜乃亜 キッチン</title>
<style>
:root{--br:#7B3F2A;--br2:#5C2D1A;--bl:#C4936A;--cr:#FAE8D0;--bg:#1A2A1A;--gn:#2E6B3E;--gn2:#1D4A2A;--rd:#C0392B;--yw:#E67E22;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:sans-serif;background:var(--bg);color:white;min-height:100vh;}
.hd{background:#1D4A2A;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #4CAF50;}
.hd h1{font-size:20px;font-weight:900;color:#C8F0C8;letter-spacing:.08em;}
.hd-right{display:flex;align-items:center;gap:10px;}
.status{font-size:12px;padding:4px 12px;border-radius:20px;background:rgba(108,204,138,0.15);color:#6CCC8A;border:1px solid #6CCC8A;}
.sound-btn{padding:6px 14px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:white;font-family:inherit;font-size:13px;cursor:pointer;}
.sound-btn.on{background:rgba(108,204,138,0.15);border-color:#6CCC8A;color:#6CCC8A;}
.empty{text-align:center;padding:80px 20px;color:rgba(255,255,255,0.2);font-size:18px;line-height:3;}
.orders{padding:14px;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}

/* カード */
.card{border-radius:16px;padding:16px;border:2px solid;transition:all .3s;}
.card.status-new{background:rgba(255,200,50,0.1);border-color:#FFC832;box-shadow:0 0 20px rgba(255,200,50,0.2);animation:pulse 1.5s ease-in-out 5;}
.card.status-cooking{background:rgba(230,126,22,0.1);border-color:var(--yw);}
.card.status-done{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.1);opacity:.5;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,200,50,0.4);}50%{box-shadow:0 0 0 10px rgba(255,200,50,0);}}

.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.tbl{font-size:22px;font-weight:900;}
.card.status-new .tbl{color:#FFC832;}
.card.status-cooking .tbl{color:var(--yw);}
.card.status-done .tbl{color:rgba(255,255,255,0.3);}
.time{font-size:12px;color:rgba(255,255,255,0.4);}
.badge{font-size:12px;font-weight:900;padding:4px 12px;border-radius:20px;}
.badge-new{background:#FFC832;color:#3A2A00;}
.badge-cooking{background:var(--yw);color:white;}
.badge-done{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);}

.items{margin-bottom:12px;border-top:1px solid rgba(255,255,255,0.08);padding-top:10px;}
.item-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dotted rgba(255,255,255,0.07);font-size:15px;}
.item-name{color:rgba(255,255,255,0.85);flex:1;}
.item-qty{color:var(--bl);margin:0 10px;font-weight:900;font-size:16px;}

/* ボタン */
.card-btn{width:100%;height:52px;border:none;border-radius:12px;font-family:inherit;font-size:17px;font-weight:900;cursor:pointer;margin-top:4px;}
.card-btn:active{opacity:.8;}
.btn-confirm{background:#FFC832;color:#3A2A00;box-shadow:0 4px 0 #A07800;}
.btn-done{background:var(--gn);color:white;box-shadow:0 4px 0 var(--gn2);}
.btn-finished{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.2);cursor:default;}
</style>
</head>
<body>
<div class="hd">
  <h1>🍳 キッチン画面</h1>
  <div class="hd-right">
    <span class="status" id="statusTxt">● 受信中</span>
    <button class="sound-btn on" id="soundBtn" onclick="togSound()">🔔 音ON</button>
  </div>
</div>
<div id="orderArea"><div class="empty">注文を待っています...</div></div>

<script>
var DB_URL='https://anoa-register-default-rtdb.asia-southeast1.firebasedatabase.app';
var orders={};
var soundOn=true;
var lastCheck=Date.now();

function togSound(){soundOn=!soundOn;var b=document.getElementById('soundBtn');b.textContent=soundOn?'🔔 音ON':'🔕 音OFF';b.classList.toggle('on',soundOn);}

function beep(type){
  if(!soundOn)return;
  try{
    var a=new(window.AudioContext||window.webkitAudioContext)();
    if(type==='new'){
      // 新着：明るい3音
      [523,659,784].forEach(function(f,i){var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;var t=a.currentTime+i*0.12;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);o.start(t);o.stop(t+0.25);});
    }
  }catch(e){}
}

function fetchOrders(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',DB_URL+'/orders.json',true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4&&xhr.status===200){
      var data=xhr.responseText==='null'?null:JSON.parse(xhr.responseText);
      var hasNew=false;
      if(data){
        Object.keys(data).forEach(function(key){
          if(!orders[key]){
            orders[key]=data[key];
            orders[key]._key=key;
            if((data[key].timestamp||0)>lastCheck)hasNew=true;
          } else {
            // ステータス更新を反映
            orders[key].status=data[key].status;
          }
        });
        if(hasNew){beep('new');lastCheck=Date.now();}
      }
      document.getElementById('statusTxt').textContent='● 受信中';
      render();
    }
  };
  xhr.send();
}

function render(){
  var area=document.getElementById('orderArea');
  var keys=Object.keys(orders);
  // 完了済みは除外して表示
  var visible=keys.filter(function(k){return orders[k].status!=='会計済み';});
  if(visible.length===0){area.innerHTML='<div class="empty">注文を待っています...</div>';return;}
  visible.sort(function(a,b){return(orders[a].timestamp||0)-(orders[b].timestamp||0);});
  var html='<div class="orders">';
  visible.forEach(function(key){
    var o=orders[key];
    var st=o.status||'新規';
    var cls=st==='新規'?'status-new':st==='調理中'?'status-cooking':'status-done';
    var badge=st==='新規'?'<span class="badge badge-new">🆕 新着</span>':st==='調理中'?'<span class="badge badge-cooking">🔥 調理中</span>':'<span class="badge badge-done">✅ 完了</span>';
    html+='<div class="card '+cls+'">';
    html+='<div class="card-head"><span class="tbl">'+o.table+'</span><div style="display:flex;align-items:center;gap:8px;">'+badge+'<span class="time">'+o.time+'</span></div></div>';
    html+='<div class="items">';
    o.items.forEach(function(item){
      html+='<div class="item-row"><span class="item-name">'+item.name+'</span><span class="item-qty">×'+item.qty+'</span></div>';
    });
    html+='</div>';
    if(st==='新規'){
      html+='<button class="card-btn btn-confirm" onclick="updateStatus(\''+key+'\',\'調理中\')">👍 確認・調理開始</button>';
    } else if(st==='調理中'){
      html+='<button class="card-btn btn-done" onclick="updateStatus(\''+key+'\',\'提供済み\')">🍽️ 調理完了・提供へ</button>';
    } else {
      html+='<button class="card-btn btn-finished">✅ 提供済み</button>';
    }
    html+='</div>';
  });
  html+='</div>';
  area.innerHTML=html;
}

function updateStatus(key,status){
  orders[key].status=status;
  var xhr=new XMLHttpRequest();
  xhr.open('PATCH',DB_URL+'/orders/'+key+'.json',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.send(JSON.stringify({status:status}));
  render();
}

fetchOrders();
setInterval(fetchOrders,5000);
</script>
</body>
</html>
