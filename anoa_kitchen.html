<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>亜乃亜 注文受信</title>
<style>
:root{--br:#7B3F2A;--br2:#5C2D1A;--bl:#C4936A;--cr:#FAE8D0;--bg:#1A1A2E;--gn:#2E6B3E;--rd:#C0392B;--yw:#E67E22;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:var(--bg);color:white;min-height:100vh;}
.hd{background:var(--br2);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--bl);}
.hd h1{font-size:20px;font-weight:900;color:var(--cr);}
.status{font-size:13px;color:var(--bl);}
.status.live{color:#6CCC8A;}
.clr-btn{padding:8px 16px;background:rgba(196,147,106,0.2);border:1.5px solid var(--bl);border-radius:8px;color:var(--bl);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.empty{text-align:center;padding:60px 20px;color:rgba(255,255,255,0.25);font-size:16px;line-height:2.5;}
.orders{padding:12px;}
.card{background:rgba(255,255,255,0.07);border-radius:14px;padding:14px 16px;margin-bottom:12px;border:2px solid rgba(196,147,106,0.2);position:relative;}
.card.new{border-color:#6CCC8A;animation:pulse 1s ease-in-out 3;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(108,204,138,0.4);}50%{box-shadow:0 0 0 8px rgba(108,204,138,0);}}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.tbl{font-size:22px;font-weight:900;color:var(--cr);}
.time{font-size:12px;color:rgba(255,255,255,0.4);}
.new-badge{background:#6CCC8A;color:#1A3A2A;font-size:11px;font-weight:900;padding:3px 10px;border-radius:20px;}
.items{margin-bottom:10px;}
.item-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dotted rgba(255,255,255,0.1);font-size:14px;}
.item-name{color:rgba(255,255,255,0.85);}
.item-qty{color:var(--bl);margin:0 8px;}
.item-price{color:rgba(255,255,255,0.5);font-size:12px;}
.disc-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#6CCC8A;}
.total-row{display:flex;justify-content:space-between;padding:8px 0 0;font-weight:900;font-size:16px;color:var(--cr);border-top:1px solid rgba(196,147,106,0.3);margin-top:4px;}
.done-btn{width:100%;height:44px;background:var(--gn);color:white;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:900;cursor:pointer;margin-top:10px;}
.done-btn:active{opacity:.8;}
.done-btn.done{background:#555;color:#999;}
.sound-btn{padding:6px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:8px;color:white;font-family:inherit;font-size:12px;cursor:pointer;}
.sound-btn.on{background:rgba(108,204,138,0.2);border-color:#6CCC8A;color:#6CCC8A;}
</style>
</head>
<body>
<div class="hd">
  <div>
    <h1>亜 乃 亜　注文受信</h1>
    <div class="status" id="statusTxt">接続中...</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="sound-btn" id="soundBtn" onclick="togSound()">🔔 音ON</button>
    <button class="clr-btn" onclick="clearDone()">完了済みを削除</button>
  </div>
</div>
<div id="orderArea"><div class="empty">注文を待っています...</div></div>

<script>
var DB_URL='https://anoa-register-default-rtdb.firebaseio.com';
var orders={};
var soundOn=true;
var lastCheck=Date.now();
var polling=null;

function togSound(){soundOn=!soundOn;var b=document.getElementById('soundBtn');b.textContent=soundOn?'🔔 音ON':'🔕 音OFF';b.classList.toggle('on',soundOn);}

function beep(){if(!soundOn)return;try{var a=new(window.AudioContext||window.webkitAudioContext)();var freqs=[523,659,784];freqs.forEach(function(f,i){var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=f;var t=a.currentTime+i*0.12;g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.2);});}catch(e){}}

function fetchOrders(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET',DB_URL+'/orders.json',true);
  xhr.onreadystatechange=function(){
    if(xhr.readyState===4&&xhr.status===200){
      var data=JSON.parse(xhr.responseText);
      var hasNew=false;
      if(data){
        Object.keys(data).forEach(function(key){
          if(!orders[key]){
            orders[key]=data[key];
            orders[key]._key=key;
            if(data[key].timestamp>lastCheck)hasNew=true;
          }
        });
        if(hasNew){beep();lastCheck=Date.now();}
      }
      render();
      document.getElementById('statusTxt').textContent='● 受信中';
      document.getElementById('statusTxt').className='status live';
    }
  };
  xhr.send();
}

function render(){
  var area=document.getElementById('orderArea');
  var keys=Object.keys(orders);
  if(keys.length===0){area.innerHTML='<div class="empty">注文を待っています...</div>';return;}
  // Sort by timestamp desc
  keys.sort(function(a,b){return(orders[b].timestamp||0)-(orders[a].timestamp||0);});
  var html='<div class="orders">';
  keys.forEach(function(key){
    var o=orders[key];
    var isDone=o.status==='完了';
    var isNew=o.status==='新規';
    html+='<div class="card'+(isNew?' new':'')+'">';
    html+='<div class="card-head">';
    html+='<span class="tbl">'+o.table+'番テーブル</span>';
    html+='<div style="display:flex;align-items:center;gap:8px;">';
    if(isNew)html+='<span class="new-badge">新着</span>';
    html+='<span class="time">'+o.time+'</span>';
    html+='</div></div>';
    html+='<div class="items">';
    o.items.forEach(function(item){
      html+='<div class="item-row"><span class="item-name">'+item.name+'</span><span class="item-qty">×'+item.qty+'</span><span class="item-price">¥'+item.sub.toLocaleString()+'</span></div>';
    });
    if(o.discount>0)html+='<div class="disc-row"><span>定食+コーヒー割引</span><span>-¥'+o.discount+'</span></div>';
    html+='<div class="total-row"><span>合計</span><span>¥'+o.total.toLocaleString()+'</span></div>';
    html+='</div>';
    html+='<button class="done-btn'+(isDone?' done':'')+'" onclick="markDone(\''+key+'\')">'+(isDone?'✅ 対応済み':'✅ 対応済みにする')+'</button>';
    html+='</div>';
  });
  html+='</div>';
  area.innerHTML=html;
}

function markDone(key){
  if(!orders[key])return;
  orders[key].status='完了';
  var xhr=new XMLHttpRequest();
  xhr.open('PATCH',DB_URL+'/orders/'+key+'.json',true);
  xhr.setRequestHeader('Content-Type','application/json');
  xhr.send(JSON.stringify({status:'完了'}));
  render();
}

function clearDone(){
  Object.keys(orders).forEach(function(key){
    if(orders[key].status==='完了'){
      var xhr=new XMLHttpRequest();
      xhr.open('DELETE',DB_URL+'/orders/'+key+'.json',true);
      xhr.send();
      delete orders[key];
    }
  });
  render();
}

// 5秒ごとにポーリング
fetchOrders();
polling=setInterval(fetchOrders,5000);
</script>
</body>
</html>
